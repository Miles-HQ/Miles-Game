<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Advanced To-Do List App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .stat-item.completed {
            border-left-color: #4ade80;
        }

        .stat-item.pending {
            border-left-color: #f59e0b;
        }

        .stat-item.all {
            border-left-color: #8b5cf6;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item.completed .stat-number {
            color: #4ade80;
        }

        .stat-item.pending .stat-number {
            color: #f59e0b;
        }

        .stat-item.all .stat-number {
            color: #8b5cf6;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }

        .input-section {
            padding: 0 30px 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #taskInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #taskInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex-shrink: 0;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .filter-section {
            display: flex;
            gap: 10px;
            padding: 20px 30px;
            border-top: 1px solid #e5e7eb;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9em;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }

        .tasks-container {
            max-height: 500px;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
            border-left: 4px solid #e5e7eb;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item:hover {
            background: #f3f4f6;
            border-left-color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .task-item.completed {
            border-left-color: #4ade80;
            opacity: 0.7;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .task-checkbox:checked {
            accent-color: #4ade80;
        }

        .task-text {
            flex: 1;
            font-size: 1em;
            color: #1f2937;
            word-break: break-word;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .task-priority {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .priority-high {
            background: #fecaca;
            color: #991b1b;
        }

        .priority-medium {
            background: #fcd34d;
            color: #92400e;
        }

        .priority-low {
            background: #bbf7d0;
            color: #065f46;
        }

        .task-date {
            font-size: 0.85em;
            color: #9ca3af;
            flex-shrink: 0;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .actions-section {
            padding: 20px 30px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 10px 15px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9em;
        }

        .btn-action:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn-action.danger {
            border-color: #ef4444;
            color: #ef4444;
        }

        .btn-action.danger:hover {
            background: #fef2f2;
        }

        .btn-action.success {
            border-color: #4ade80;
            color: #4ade80;
        }

        .btn-action.success:hover {
            background: #f0fdf4;
        }

        .priority-select {
            padding: 8px 10px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .priority-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .tasks-container::-webkit-scrollbar {
            width: 8px;
        }

        .tasks-container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .tasks-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .tasks-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4ade80;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            animation: slideInUp 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.error {
            background: #ef4444;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
                margin: 15px 20px;
            }

            .input-section,
            .filter-section,
            .actions-section {
                padding-left: 20px;
                padding-right: 20px;
            }

            .tasks-container {
                padding-left: 20px;
                padding-right: 20px;
            }

            .task-date {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Tasks</h1>
            <p>Stay organized and productive</p>
        </div>

        <div class="stats">
            <div class="stat-item all">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-item pending">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-item completed">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <select id="prioritySelect" class="priority-select">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button class="btn btn-add" onclick="addTask()">Add</button>
            </div>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" onclick="filterTasks('all')">All</button>
            <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
            <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
            <button class="filter-btn" onclick="filterTasks('high')">High Priority</button>
            <button class="filter-btn" onclick="filterTasks('medium')">Medium Priority</button>
            <button class="filter-btn" onclick="filterTasks('low')">Low Priority</button>
        </div>

        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state">
                <div class="empty-state-icon">🚀</div>
                <div class="empty-state-text">No tasks yet!</div>
                <p>Add a task to get started and boost your productivity</p>
            </div>
        </div>

        <div class="actions-section">
            <button class="btn-action success" onclick="completeAllTasks()">✓ Complete All</button>
            <button class="btn-action" onclick="sortTasks()">↕ Sort by Priority</button>
            <button class="btn-action" onclick="exportTasks()">⬇ Export</button>
            <button class="btn-action danger" onclick="clearCompleted()">🗑 Clear Completed</button>
            <button class="btn-action danger" onclick="clearAll()">🗑 Clear All</button>
        </div>
    </div>

    <script>
        let tasks = [];
        let currentFilter = 'all';
        const STORAGE_KEY = 'todoTasks';

        window.addEventListener('load', () => {
            loadTasks();
            renderTasks();
            setupEventListeners();
        });

        function setupEventListeners() {
            const taskInput = document.getElementById('taskInput');
            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addTask();
                }
            });
        }

        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const prioritySelect = document.getElementById('prioritySelect');
            const taskText = taskInput.value.trim();
            const priority = prioritySelect.value;

            if (!taskText) {
                showToast('Please enter a task!', 'error');
                return;
            }

            if (taskText.length > 100) {
                showToast('Task is too long (max 100 characters)', 'error');
                return;
            }

            const task = {
                id: Date.now(),
                text: taskText,
                completed: false,
                priority: priority,
                createdAt: new Date().toLocaleDateString(),
                dueDate: null
            };

            tasks.unshift(task);
            saveTasks();
            renderTasks();
            taskInput.value = '';
            taskInput.focus();
            showToast('Task added successfully!');
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            showToast('Task deleted');
        }

        function filterTasks(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderTasks();
        }

        function getFilteredTasks() {
            switch (currentFilter) {
                case 'pending':
                    return tasks.filter(t => !t.completed);
                case 'completed':
                    return tasks.filter(t => t.completed);
                case 'high':
                    return tasks.filter(t => t.priority === 'high');
                case 'medium':
                    return tasks.filter(t => t.priority === 'medium');
                case 'low':
                    return tasks.filter(t => t.priority === 'low');
                default:
                    return tasks;
            }
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const filteredTasks = getFilteredTasks();

            updateStats();

            if (filteredTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <div class="empty-state-text">No tasks to display</div>
                        <p>Try adjusting your filters or add a new task</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredTasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        class="task-checkbox"
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${task.id})"
                    >
                    <span class="task-text">${escapeHtml(task.text)}</span>
                    <span class="task-priority priority-${task.priority}">
                        ${task.priority}
                    </span>
                    <span class="task-date">${task.createdAt}</span>
                    <button class="btn-delete" onclick="deleteTask(${task.id})">Delete</button>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
        }

        function sortTasks() {
            const priorityOrder = { high: 1, medium: 2, low: 3 };
            tasks.sort((a, b) => {
                if (a.completed === b.completed) {
                    return priorityOrder[a.priority] - priorityOrder[b.priority];
                }
                return a.completed ? 1 : -1;
            });
            saveTasks();
            renderTasks();
            showToast('Tasks sorted by priority');
        }

        function completeAllTasks() {
            if (tasks.length === 0) {
                showToast('No tasks to complete', 'error');
                return;
            }
            tasks.forEach(task => task.completed = true);
            saveTasks();
            renderTasks();
            showToast('All tasks completed! 🎉');
        }

        function clearCompleted() {
            const completedCount = tasks.filter(t => t.completed).length;
            if (completedCount === 0) {
                showToast('No completed tasks to clear', 'error');
                return;
            }
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
            renderTasks();
            showToast(`${completedCount} completed task(s) removed`);
        }

        function clearAll() {
            if (tasks.length === 0) {
                showToast('No tasks to clear', 'error');
                return;
            }
            if (confirm('Are you sure you want to delete all tasks? This cannot be undone.')) {
                tasks = [];
                saveTasks();
                renderTasks();
                showToast('All tasks cleared');
            }
        }

        function exportTasks() {
            if (tasks.length === 0) {
                showToast('No tasks to export', 'error');
                return;
            }
            const dataStr = JSON.stringify(tasks, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `tasks-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('Tasks exported successfully');
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        function loadTasks() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    tasks = JSON.parse(stored);
                } catch (e) {
                    console.error('Error loading tasks:', e);
                    tasks = [];
                }
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
